name: Ubuntu & Income

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  ubuntu:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: System Update and Install Tailscale
        run: |
          sudo apt update -y
          sudo apt install git wget docker-compose unzip -y
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTHKEY }} --ssh --hostname=github-runner

